{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
         body {
            background: url("{% static 'image/bg.jpg' %}") no-repeat center center fixed;
            font-family:Georgia, 'Times New Roman', Times, serif;
            height: 120vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            
        }
        .auth-card {
           
            border-radius: 20px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.6), 0 6px 20px 0 rgba(0, 0, 0, 0.7);
            overflow: hidden;
            max-width: 900px;
            width: 90%;
            height: 500px;
            animation: fadeIn 1s ease-in-out;
            background: linear-gradient(to bottom, #7c69a5, #6d3778);
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
        }

        img {
            max-width: 150px; /* Ajuster la taille du logo */
            margin-bottom: 15px;
        
        }

        h2{
            margin-top: 50px;
        }

        p{
            margin-top: 50px;
            margin-bottom: 50px;
        }

        .btn-primary {
            background: #f6ccff;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            
        }
        .btn-primary:hover {
            background: #7c69a5;
        }

    </style>
</head>
<body>
    <div class="auth-card">
        <div class="row no-gutters">
            <!-- Section gauche -->
            <div class="col-md-6 auth-left">
                <img src="{% static 'image/logo.png' %}" alt="MEHO CLUBS Logo">
            </div>
            <!-- Section droite -->
            <div class="col-md-6 auth-right">
               
                <form method="post">
                    <h1>Bienvenue sur la plateforme de gestion des clubs</h1>
                    <p>Veuillez vous connecter ou créer un compte pour continuer.</p>
                    <a href="{% url 'connexion' %}" class="btn-primary">Se connecter</a>
                    <a href="{% url 'inscription' %}" class="btn-primary">S'inscrire</a>
                   
                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
